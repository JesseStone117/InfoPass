<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Share via QR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      transition: all 0.6s ease;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 2.3rem;
      margin-bottom: 40px;
      color: white;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .qr-area {
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 24px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
    }

    #qrcode {
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .result-area {
      width: 100%;
      max-width: 680px;
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 32px;
    }

    body.received .content {
      flex-direction: row;
      align-items: flex-start;
      gap: 60px;
      justify-content: center;
    }

    body.received .qr-area {
      transform: scale(0.38);
      transform-origin: top left;
      padding: 16px;
      margin-top: 10px;
    }

    body.received .result-area {
      opacity: 1;
      transform: translateY(0);
    }

    .result-area h2 {
      margin: 0 0 20px 0;
      color: #60a5fa;
      font-size: 1.5rem;
    }

    /* New styles for line items */
    #received-list {
      background: #1e2937;
      border-radius: 12px;
      border: 1px solid #334155;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .item-row {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid #334155;
      gap: 16px;
      transition: background 0.2s;
    }

    .item-row:last-child {
      border-bottom: none;
    }

    .item-row:hover {
      background: #273549;
    }

    .item-text {
      flex: 1;
      font-size: 1.05rem;
      line-height: 1.5;
      word-break: break-all;
      white-space: pre-wrap;
    }

    .copy-item-btn {
      padding: 8px 14px;
      font-size: 0.95rem;
      background: #334155;
      color: #e2e8f0;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .copy-item-btn:hover {
      background: #475569;
    }

    .copy-item-btn.copied {
      background: #22c55e;
      color: white;
    }

    #copy-all-btn {
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    #copy-all-btn:hover {
      background: #2563eb;
    }

    #copy-all-btn.copied {
      background: #22c55e;
    }

    small {
      color: #94a3b8;
      display: block;
      margin-top: 12px;
      text-align: center;
    }

    @media (max-width: 900px) {
      body.received .content {
        flex-direction: column;
      }
      body.received .qr-area {
        transform: scale(0.45);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="content">
      <!-- QR Code -->
      <div class="qr-area">
        <div id="qrcode"></div>
      </div>

      <!-- Result Panel -->
      <div class="result-area">
        <h2>Received Data</h2>
        <div id="received-list">
          Waiting for data...<br><br>
          <small>Point your phone camera at the QR code</small>
        </div>
        <button id="copy-all-btn" style="display: none;">
          📋 Copy All
        </button>
      </div>
    </div>
  </div>

  <script>
    const uuid = crypto.randomUUID();
    const url = `${location.origin}/join?uuid=${uuid}`;

    new QRCode(document.getElementById("qrcode"), {
      text: url,
      width: 750,
      height: 750,
      colorDark: "#0f172a",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });

    const socket = io('wss://' + location.host, {
      query: { uuid },
      transports: ['websocket'],
      reconnection: true,
      reconnectionAttempts: 5
    });

    const receivedList = document.getElementById('received-list');
    const copyAllBtn = document.getElementById('copy-all-btn');
    let currentText = '';
    let currentLines = [];

    socket.on('connect', () => {
      receivedList.innerHTML = `Waiting for data...<br><br><small>UUID: ${uuid.slice(0,8)}…</small>`;
      copyAllBtn.style.display = 'none';
    });

    socket.on('message', (text) => {
      currentText = text.trim();
      currentLines = currentText.split('\n').map(line => line.trimEnd());

      renderItems();
      
      copyAllBtn.style.display = 'block';
      document.body.classList.add('received');
    });

    function renderItems() {
      receivedList.innerHTML = '';

      if (currentLines.length <= 1) {
        // Single line case
        const div = document.createElement('div');
        div.className = 'item-row';
        div.innerHTML = `
          <div class="item-text">${currentLines[0] || currentText}</div>
          <button class="copy-item-btn" data-text="${currentText.replace(/"/g, '&quot;')}">📋 Copy</button>
        `;
        receivedList.appendChild(div);
      } else {
        // Multiple lines
        currentLines.forEach((line, index) => {
          if (line.length === 0 && index !== currentLines.length-1) {
            const empty = document.createElement('div');
            empty.className = 'item-row';
            empty.style.opacity = '0.4';
            empty.innerHTML = `<div class="item-text" style="font-style:italic;">(empty line)</div>`;
            receivedList.appendChild(empty);
            return;
          }

          const div = document.createElement('div');
          div.className = 'item-row';
          div.innerHTML = `
            <div class="item-text">${line}</div>
            <button class="copy-item-btn" data-text="${line.replace(/"/g, '&quot;')}">📋 Copy</button>
          `;
          receivedList.appendChild(div);
        });
      }

      // Add click listeners to all copy buttons
      document.querySelectorAll('.copy-item-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const textToCopy = btn.dataset.text;
          
          navigator.clipboard.writeText(textToCopy).then(() => {
            const original = btn.innerHTML;
            btn.innerHTML = '✅';
            btn.classList.add('copied');
            
            setTimeout(() => {
              btn.innerHTML = original;
              btn.classList.remove('copied');
            }, 1600);
          });
        });
      });
    }

    // Copy All button
    copyAllBtn.addEventListener('click', () => {
      if (!currentText) return;
      
      navigator.clipboard.writeText(currentText).then(() => {
        const original = copyAllBtn.innerHTML;
        copyAllBtn.innerHTML = '✅ Copied All!';
        copyAllBtn.classList.add('copied');
        
        setTimeout(() => {
          copyAllBtn.innerHTML = original;
          copyAllBtn.classList.remove('copied');
        }, 2000);
      });
    });

    socket.on('disconnect', () => {
      receivedList.innerHTML += '<br><br><small style="color:#f87171">(Disconnected – refreshing may help)</small>';
    });
  </script>
</body>
</html>
