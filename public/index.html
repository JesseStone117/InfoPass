<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Share via QR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      transition: all 0.6s ease;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      transition: all 0.6s ease;
    }

    h1 {
      text-align: center;
      font-size: 2.3rem;
      margin-bottom: 40px;
      color: white;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .qr-area {
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 24px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
    }

    #qrcode {
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .result-area {
      width: 100%;
      max-width: 680px;
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 32px;
    }

    body.received .content {
      flex-direction: row;
      align-items: flex-start;
      gap: 60px;
      justify-content: center;
    }

    body.received .qr-area {
      transform: scale(0.38);
      transform-origin: top left;
      padding: 16px;
      margin-top: 10px;
    }

    body.received .result-area {
      opacity: 1;
      transform: translateY(0);
    }

    .result-area h2 {
      margin: 0 0 20px 0;
      color: #60a5fa;
      font-size: 1.5rem;
    }

    #received {
      background: #1e2937;
      padding: 24px;
      border-radius: 12px;
      min-height: 220px;
      max-height: 480px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-size: 1.1rem;
      line-height: 1.55;
      border: 1px solid #334155;
      margin-bottom: 24px;
    }

    #copy-btn {
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    #copy-btn:hover {
      background: #2563eb;
    }

    #copy-btn.copied {
      background: #22c55e;
    }

    small {
      color: #94a3b8;
      display: block;
      margin-top: 12px;
      text-align: center;
    }

    @media (max-width: 900px) {
      body.received .content {
        flex-direction: column;
      }
      body.received .qr-area {
        transform: scale(0.45);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="content">
      <!-- QR Code -->
      <div class="qr-area">
        <div id="qrcode"></div>
      </div>

      <!-- Result Panel -->
      <div class="result-area">
        <h2>Received Data</h2>
        <div id="received">
          Waiting for data...<br><br>
          <small>Point your phone camera at the QR code</small>
        </div>
        <button id="copy-btn" style="display: none;">📋 Copy to Clipboard</button>
      </div>
    </div>
  </div>

  <script>
    const uuid = crypto.randomUUID();
    const url = `${location.origin}/join?uuid=${uuid}`;

    // Large QR while waiting
    new QRCode(document.getElementById("qrcode"), {
      text: url,
      width: 750,
      height: 750,
      colorDark: "#0f172a",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });

    const socket = io('wss://' + location.host, {
      query: { uuid },
      transports: ['websocket'],
      reconnection: true,
      reconnectionAttempts: 5
    });

    const receivedEl = document.getElementById('received');
    const copyBtn = document.getElementById('copy-btn');
    let currentText = '';

    socket.on('connect', () => {
      receivedEl.innerHTML = `Waiting for data...<br><br><small>UUID: ${uuid.slice(0,8)}…</small>`;
    });

    socket.on('message', (text) => {
      currentText = text;
      receivedEl.textContent = text;
      copyBtn.style.display = 'block';

      // Trigger the animation
      document.body.classList.add('received');
    });

    // Copy functionality
    copyBtn.addEventListener('click', () => {
      if (!currentText) return;
      
      navigator.clipboard.writeText(currentText).then(() => {
        const original = copyBtn.innerHTML;
        copyBtn.innerHTML = '✅ Copied!';
        copyBtn.classList.add('copied');
        
        setTimeout(() => {
          copyBtn.innerHTML = original;
          copyBtn.classList.remove('copied');
        }, 1800);
      });
    });

    socket.on('disconnect', () => {
      receivedEl.innerHTML += '<br><br><small style="color:#f87171">(Disconnected – refreshing may help)</small>';
    });
  </script>
</body>
</html>
