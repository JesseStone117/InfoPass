<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Share</title>
  <meta name="theme-color" content="#6366f1">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="/style.css" />
  <!-- Fixed QR library (browser bundle) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/lib/browser.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" data-tab="display">Display QR</button>
      <button class="tab-btn" data-tab="send">Send Text</button>
    </div>

    <div id="display-tab" class="tab-content active">
      <h1>Scan from your phone</h1>
      <div id="qrcode-container">
        <div id="qrcode"></div>
        <p id="qr-error" style="display:none; color:#ef4444; text-align:center; margin-top:1rem;">
          QR failed to generate – try refreshing
        </p>
      </div>
      <div id="received" class="received-box">
        Waiting for text...<br>
        <small>Use your phone's camera app to scan the QR code</small>
      </div>
    </div>

    <div id="send-tab" class="tab-content">
      <h1>Send Text</h1>
      <textarea id="input" placeholder="Type or paste your message here..."></textarea>
      <button onclick="sendText()">Send Now</button>
      <p id="status">Ready...</p>
    </div>
  </div>

  <script>
    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab + '-tab').classList.add('active');
      });
    });

    // Auto-switch to Send tab when opened via QR (?uuid=...)
    const params = new URLSearchParams(location.search);
    const uuidFromUrl = params.get('uuid');
    if (uuidFromUrl) {
      document.querySelector('[data-tab="display"]').classList.remove('active');
      document.querySelector('[data-tab="send"]').classList.add('active');
      document.getElementById('display-tab').classList.remove('active');
      document.getElementById('send-tab').classList.add('active');
    }

    // UUID & Socket
    const uuid = uuidFromUrl || crypto.randomUUID();
    const socket = io('wss://' + location.host, {
      query: { uuid },
      transports: ['websocket'],
      reconnection: true
    });

    socket.on('connect', () => {
      if (uuidFromUrl) {
        document.getElementById('status').textContent = 'Connected – ready to send';
      }
    });

    // Display QR logic (only run if this is the display device)
    if (!uuidFromUrl) {
      const qrcodeEl = document.getElementById('qrcode');
      const shareUrl = location.origin + '?uuid=' + uuid;

      QRCode.toCanvas(qrcodeEl, shareUrl, {
        width: 1,  // dummy – controlled by CSS
        margin: 2,
        color: { dark: '#000000', light: '#ffffff' },
        errorCorrectionLevel: 'H'
      }, (err) => {
        if (err) {
          console.error('QR generation error:', err);
          document.getElementById('qr-error').style.display = 'block';
        }
      });

      function resizeQR() {
        const size = Math.min(window.innerWidth, window.innerHeight) * 0.88;
        qrcodeEl.style.width = size + 'px';
        qrcodeEl.style.height = size + 'px';
        const canvas = qrcodeEl.querySelector('canvas');
        if (canvas) {
          canvas.style.width = '100%';
          canvas.style.height = '100%';
        }
      }

      window.addEventListener('resize', resizeQR);
      resizeQR();

      socket.on('message', (text) => {
        const received = document.getElementById('received');
        received.innerHTML = `
          <strong>Received:</strong><br>
          <span id="received-text">${text.replace(/\n/g, '<br>')}</span><br>
          <button onclick="copyReceived()">Copy Text</button>
        `;
      });
    }

    // Send logic
    function sendText() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) {
        document.getElementById('status').textContent = 'Please enter some text';
        return;
      }
      socket.emit('send', text);
      document.getElementById('status').innerHTML = `Sent at ${new Date().toLocaleTimeString()}`;
      input.value = '';
    }

    function copyReceived() {
      const textEl = document.getElementById('received-text');
      if (!textEl) return;
      const plainText = textEl.innerText.replace(/<br>/g, '\n');
      navigator.clipboard.writeText(plainText).then(() => {
        const btn = document.querySelector('#received button');
        if (btn) {
          const original = btn.textContent;
          btn.textContent = 'Copied!';
          setTimeout(() => { btn.textContent = original; }, 2000);
        }
      });
    }

    // Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered'))
          .catch(err => console.log('SW error:', err));
      });
    }
  </script>
</body>
</html>
