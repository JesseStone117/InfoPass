<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Share via QR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 620px;
      width: 100%;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 30px;
      color: white;
    }

    #qrcode {
      margin: 0 auto 40px;
      padding: 24px;
      background: white;
      border-radius: 20px;
      display: inline-block;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    #received {
      background: rgba(255,255,255,0.08);
      padding: 24px;
      border-radius: 16px;
      font-size: 1.1rem;
      line-height: 1.5;
      min-height: 80px;
    }

    small {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    @media (max-width: 600px) {
      #qrcode {
        padding: 16px;
      }
      h1 {
        font-size: 1.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Share via QR</h1>
    <div id="qrcode"></div>
    <div id="received">
      Waiting for data...<br>
      <small>Point your phone camera at this QR code</small>
    </div>
  </div>

  <script>
    const uuid = crypto.randomUUID();
    const url = `${location.origin}/join?uuid=${uuid}`;

    // Much larger QR code
    new QRCode(document.getElementById("qrcode"), {
      text: url,
      width: 800,
      height: 800,
      colorDark: "#0f172a",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });

    const socket = io('wss://' + location.host, {
      query: { uuid },
      transports: ['websocket'],
      reconnection: true,
      reconnectionAttempts: 5
    });

    socket.on('connect', () => {
      document.getElementById('received').innerHTML = 
        `Waiting for data...<br><small>UUID: ${uuid.slice(0,8)}…</small>`;
    });

    socket.on('message', (text) => {
      document.getElementById('received').innerHTML = 
        `<strong>Received:</strong><br>${text.replace(/\n/g, '<br>')}`;
    });

    socket.on('disconnect', () => {
      document.getElementById('received').innerHTML += 
        '<br><small>(Disconnected – refreshing may help)</small>';
    });
  </script>
</body>
</html>
