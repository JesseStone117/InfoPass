<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Share via QR</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>Share via QR</h1>
    <div id="qrcode"></div>
    <div id="received">
      Waiting for data...<br>
      <small>Point your phone camera at this QR code</small>
    </div>
  </div>

  <script>
    const uuid = crypto.randomUUID();
    const url = `${location.origin}/join?uuid=${uuid}`;

    new QRCode(document.getElementById("qrcode"), {
      text: url,
      width: 280,
      height: 280,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });

    const socket = io('wss://' + location.host, {
      query: { uuid },
      transports: ['websocket'],
      reconnection: true,
      reconnectionAttempts: 5
    });

    socket.on('connect', () => {
      document.getElementById('received').innerHTML =
        `Waiting for data...<br><small>UUID: ${uuid.slice(0,8)}…</small>`;
    });

    socket.on('message', (text) => {
      document.getElementById('received').innerHTML =
        `<strong>Received:</strong><br>${text.replace(/\n/g, '<br>')}`;
    });

    socket.on('disconnect', () => {
      document.getElementById('received').innerHTML += '<br><small>(Disconnected – refreshing may help)</small>';
    });
  </script>
</body>
</html>
