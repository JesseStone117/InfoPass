<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Share</title>
  <meta name="theme-color" content="#6366f1">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6366f1">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
</head>
<body>
  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" data-tab="display">Display QR</button>
      <button class="tab-btn" data-tab="send">Send Text</button>
    </div>

    <div id="display-tab" class="tab-content active">
      <h1>Scan from your phone</h1>
      <div id="qrcode-container">
        <div id="qrcode"></div>
      </div>
      <div id="received" class="received-box">
        Waiting for text...<br>
        <small>Use your phone's camera app to scan the QR code</small>
      </div>
    </div>

    <div id="send-tab" class="tab-content">
      <h1>Send Text</h1>
      <textarea id="input" placeholder="Type or paste your message here..."></textarea>
      <button onclick="sendText()">Send Now</button>
      <p id="status">Ready...</p>
    </div>
  </div>

  <script>
    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(function(b) {
          b.classList.remove('active');
        });
        document.querySelectorAll('.tab-content').forEach(function(c) {
          c.classList.remove('active');
        });
        btn.classList.add('active');
        document.getElementById(btn.getAttribute('data-tab') + '-tab').classList.add('active');
      });
    });

    // Auto-switch to Send tab if coming from QR scan (?uuid=...)
    const params = new URLSearchParams(location.search);
    const uuidFromUrl = params.get('uuid');
    if (uuidFromUrl) {
      var displayBtn = document.querySelector('[data-tab="display"]');
      var sendBtn = document.querySelector('[data-tab="send"]');
      if (displayBtn) displayBtn.classList.remove('active');
      if (sendBtn) sendBtn.classList.add('active');

      var displayTab = document.getElementById('display-tab');
      var sendTab = document.getElementById('send-tab');
      if (displayTab) displayTab.classList.remove('active');
      if (sendTab) sendTab.classList.add('active');
    }

    // UUID & Socket
    const uuid = uuidFromUrl || crypto.randomUUID();
    const socket = io('wss://' + location.host, {
      query: { uuid: uuid },
      transports: ['websocket'],
      reconnection: true
    });

    socket.on('connect', function() {
      if (uuidFromUrl) {
        document.getElementById('status').textContent = 'Connected – ready to send';
      }
    });

    // Display QR logic (only if not opened from link)
    if (!uuidFromUrl) {
      var qrcodeEl = document.getElementById('qrcode');

      var shareUrl = location.origin + '?uuid=' + uuid;

      new QRCode(qrcodeEl, {
        text: shareUrl,
        width: 1,
        height: 1,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });

      function resizeQR() {
        var size = Math.min(window.innerWidth, window.innerHeight) * 0.88;
        qrcodeEl.style.width = size + 'px';
        qrcodeEl.style.height = size + 'px';
        var img = qrcodeEl.querySelector('img');
        if (img) {
          img.style.width = '100%';
          img.style.height = '100%';
        }
      }

      window.addEventListener('resize', resizeQR);
      resizeQR();

      socket.on('message', function(text) {
        var received = document.getElementById('received');
        received.innerHTML =
          '<strong>Received:</strong><br>' +
          '<span id="received-text">' + text.replace(/\n/g, '<br>') + '</span><br>' +
          '<button onclick="copyReceived()">Copy Text</button>';
      });
    }

    // Send logic
    function sendText() {
      var input = document.getElementById('input');
      var text = input.value.trim();
      if (!text) {
        document.getElementById('status').textContent = 'Please enter some text';
        return;
      }
      socket.emit('send', text);
      document.getElementById('status').innerHTML = 'Sent at ' + new Date().toLocaleTimeString();
      input.value = '';
    }

    function copyReceived() {
      var textEl = document.getElementById('received-text');
      if (!textEl) return;
      var plain = textEl.innerText.replace(/<br>/g, '\n');
      navigator.clipboard.writeText(plain).then(function() {
        var btn = document.querySelector('#received button');
        if (btn) {
          var originalText = btn.textContent;
          btn.textContent = 'Copied!';
          setTimeout(function() { btn.textContent = originalText; }, 2000);
        }
      });
    }

    // PWA / Service Worker registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js')
          .then(function(reg) {
            console.log('Service Worker registered', reg);
          })
          .catch(function(err) {
            console.log('Service Worker registration failed:', err);
          });
      });
    }
  </script>
</body>
</html>
