<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Share</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" data-tab="display">Display QR</button>
      <button class="tab-btn" data-tab="send">Send Text</button>
    </div>

    <!-- Display QR Tab -->
    <div id="display-tab" class="tab-content active">
      <h1>Scan me from your phone</h1>
      <div id="qrcode-container">
        <div id="qrcode"></div>
      </div>
      <div id="received" class="received-box">
        Waiting for text...<br>
        <small>Use your phone's camera app to scan the QR</small>
      </div>
    </div>

    <!-- Send Text Tab -->
    <div id="send-tab" class="tab-content">
      <h1>Send Text</h1>
      <textarea id="input" placeholder="Type, paste, or enter your message here..."></textarea>
      <button onclick="sendText()">Send Now</button>
      <p id="status">Ready...</p>
    </div>
  </div>

  <script>
    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`${btn.dataset.tab}-tab`).classList.add('active');
      });
    });

    // Auto-switch to Send tab if ?uuid= present (when scanned)
    const params = new URLSearchParams(location.search);
    const uuidFromUrl = params.get('uuid');
    if (uuidFromUrl) {
      document.querySelector('[data-tab="display"]').classList.remove('active');
      document.querySelector('[data-tab="send"]').classList.add('active');
      document.getElementById('display-tab').classList.remove('active');
      document.getElementById('send-tab').classList.add('active');
    }

    // ── Shared Socket ──
    const uuid = uuidFromUrl || crypto.randomUUID();
    const socket = io('wss://' + location.host, {
      query: { uuid },
      transports: ['websocket'],
      reconnection: true
    });

    socket.on('connect', () => {
      if (uuidFromUrl) {
        document.getElementById('status').textContent = 'Connected – enter text and send';
      }
    });

    // ── Display side ──
    if (!uuidFromUrl) {
      const qrContainer = document.getElementById('qrcode-container');
      const qrcodeEl = document.getElementById('qrcode');

      const url = `${location.origin}?uuid=${uuid}`;

      new QRCode(qrcodeEl, {
        text: url,
        width: 1,   // dummy – we override with CSS
        height: 1,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });

      // Make QR as large as possible
      function resizeQR() {
        const size = Math.min(window.innerWidth, window.innerHeight) * 0.85;
        qrcodeEl.style.width = size + 'px';
        qrcodeEl.style.height = size + 'px';
        qrcodeEl.querySelector('img')?.style.width = '100%';
        qrcodeEl.querySelector('img')?.style.height = '100%';
      }
      window.addEventListener('resize', resizeQR);
      resizeQR();

      socket.on('message', (text) => {
        const received = document.getElementById('received');
        received.innerHTML = `
          <strong>Received:</strong><br>
          <span id="received-text">${text.replace(/\n/g, '<br>')}</span><br>
          <button onclick="copyReceived()">Copy Text</button>
        `;
      });
    }

    // ── Send side ──
    function sendText() {
      const text = document.getElementById('input').value.trim();
      if (!text) {
        document.getElementById('status').textContent = 'Please enter some text';
        return;
      }
      socket.emit('send', text);
      document.getElementById('status').innerHTML = `Sent successfully at ${new Date().toLocaleTimeString()}`;
      document.getElementById('input').value = '';
    }

    // Copy received text (on display side)
    function copyReceived() {
      const textEl = document.getElementById('received-text');
      if (!textEl) return;
      navigator.clipboard.writeText(textEl.innerText.replace(/<br>/g, '\n')).then(() => {
        const btn = document.querySelector('#received button');
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = orig, 2000);
      });
    }
  </script>
</body>
</html>
