<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Share via QR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      gap: 50px;
      align-items: flex-start;
      max-width: 1100px;
      width: 100%;
      flex-wrap: wrap;
      justify-content: center;
    }

    .qr-section {
      text-align: center;
    }

    .qr-section h1 {
      font-size: 2.2rem;
      margin-bottom: 30px;
      color: white;
    }

    #qrcode {
      margin: 0 auto;
      padding: 24px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .received-section {
      min-width: 340px;
      max-width: 460px;
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 28px;
      height: fit-content;
    }

    .received-section h2 {
      margin: 0 0 16px 0;
      font-size: 1.4rem;
      color: #60a5fa;
    }

    #received {
      background: #1e2937;
      padding: 20px;
      border-radius: 12px;
      min-height: 180px;
      max-height: 420px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-size: 1.05rem;
      line-height: 1.5;
      margin-bottom: 20px;
      border: 1px solid #334155;
    }

    #copy-btn {
      width: 100%;
      padding: 14px;
      font-size: 1.05rem;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }

    #copy-btn:hover {
      background: #2563eb;
    }

    #copy-btn.copied {
      background: #22c55e;
    }

    small {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    @media (max-width: 900px) {
      .container {
        gap: 30px;
      }
      #qrcode {
        width: 380px;
        height: 380px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Left: QR Code -->
    <div class="qr-section">
      <h1>Share via QR</h1>
      <div id="qrcode"></div>
    </div>

    <!-- Right: Received Content -->
    <div class="received-section">
      <h2>Received Data</h2>
      <div id="received">
        Waiting for data...<br><br>
        <small>Point your phone camera at the QR code on the left</small>
      </div>
      <button id="copy-btn" style="display: none;">📋 Copy to Clipboard</button>
    </div>
  </div>

  <script>
    const uuid = crypto.randomUUID();
    const url = `${location.origin}/join?uuid=${uuid}`;

    // Large QR Code
    new QRCode(document.getElementById("qrcode"), {
      text: url,
      width: 520,
      height: 520,
      colorDark: "#0f172a",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });

    const socket = io('wss://' + location.host, {
      query: { uuid },
      transports: ['websocket'],
      reconnection: true,
      reconnectionAttempts: 5
    });

    const receivedEl = document.getElementById('received');
    const copyBtn = document.getElementById('copy-btn');
    let currentText = '';

    socket.on('connect', () => {
      receivedEl.innerHTML = `Waiting for data...<br><br><small>UUID: ${uuid.slice(0,8)}…</small>`;
    });

    socket.on('message', (text) => {
      currentText = text;
      receivedEl.textContent = text;           // Use textContent to preserve formatting
      copyBtn.style.display = 'block';
    });

    // Copy functionality
    copyBtn.addEventListener('click', () => {
      if (!currentText) return;
      
      navigator.clipboard.writeText(currentText).then(() => {
        const originalText = copyBtn.textContent;
        copyBtn.textContent = '✅ Copied!';
        copyBtn.classList.add('copied');
        
        setTimeout(() => {
          copyBtn.textContent = originalText;
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    });

    socket.on('disconnect', () => {
      receivedEl.innerHTML += '<br><br><small style="color:#f87171">(Disconnected – try refreshing)</small>';
    });
  </script>
</body>
</html>
